# Render Blueprint - Deploy WorkKnock for free
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API ──
  - type: web
    name: workknock-api
    runtime: node
    region: frankfurt  # EU region, closest to France
    plan: free
    buildCommand: cd backend && npm ci && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push --accept-data-loss && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # Set after frontend is deployed
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: WHATSAPP_INSTANCE_ID
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_API_URL
        value: https://api.green-api.com
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: TEAMS_APP_ID
        sync: false
      - key: TEAMS_APP_PASSWORD
        sync: false

  # ── Frontend (Static Site) ──
  - type: web
    name: workknock-app
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to your backend URL like https://workknock-api.onrender.com/api
